name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  manifest-guard:
    name: Manifest permission guard (fast-fail)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - name: Run forbidden-permission guard test only
        run: |
          ./gradlew --no-daemon :app:testDebugUnitTest \
            --tests "dev.jongwoo.androidvm.bridge.ManifestPermissionGuardTest"

  gradle-gate:
    name: Canonical Gradle gate
    runs-on: ubuntu-latest
    needs: manifest-guard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-
      - name: Cache Android SDK / NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.android/sdk
            ~/.android/cache
          key: android-sdk-${{ runner.os }}-${{ hashFiles('app/build.gradle.kts') }}
          restore-keys: |
            android-sdk-${{ runner.os }}-
      - uses: android-actions/setup-android@v3
      - name: Run canonical gate
        run: |
          ./gradlew --no-daemon \
            :app:testDebugUnitTest \
            :app:assembleDebug \
            :app:lintDebug \
            :app:assembleRelease
      - name: Publish unit test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testDebugUnitTest-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore
      - name: Publish lint report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lintDebug-report
          path: app/build/reports/lint-results-debug.html
          if-no-files-found: ignore
